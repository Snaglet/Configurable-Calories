  set: (k,v) => { try { localStorage.setItem(k,v); return true; } catch { return false; } }
};
const fmtKey = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
const fmtDisplay = d => d.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});

const saveMeals = (d,m) => ls.set(`jct:m:${d}`, JSON.stringify(m));
const loadBaseGoal = () => parseInt(ls.get("jct:basegoal") || "1600");
const saveBaseGoal = g => ls.set("jct:basegoal", String(g));
const loadKey = () => ls.get("jct:apikey") || "";
const saveKey = k => ls.set("jct:apikey", k);

const saveWeights = w => ls.set("jct:weights", JSON.stringify(w));
const loadFoodDB = () => { try { return JSON.parse(ls.get("jct:fooddb") || "{}"); } catch { return {}; } };
const saveFoodDB = db => ls.set("jct:fooddb", JSON.stringify(db));
const loadOnboarded = () => ls.get("jct:onboarded") === "1";
const setOnboarded = () => ls.set("jct:onboarded","1");

// food DB: key = normalized name, value = {calories, proteinG, carbsG, fatG, sugarG, fiberG, servings, lastServings}
function recordFoodToDB(ing) {
  if(!ing?.name) return;
  const db = loadFoodDB();
  const key = ing.name.toLowerCase().trim();
  db[key] = {
    name: ing.name,
    calories: ing.calories,
    proteinG: ing.proteinG||0,
    carbsG: ing.carbsG||0,
    fatG: ing.fatG||0,
    sugarG: ing.sugarG||0,
    fiberG: ing.fiberG||0,
    servings: ing.servings||1,
  };
  saveFoodDB(db);
}
function getFoodFromDB(name) {
  const db = loadFoodDB();
  return db[name?.toLowerCase()?.trim()] || null;
}

// ─── AI ──────────────────────────────────────────────────────────────────────
async function analyze(apiKey, imageData, description) {
  if (!apiKey) throw new Error("No API key — go to Settings");
  const userPrompt = imageData
    ? `Analyze this food image.${description?` Note: "${description}".`:""} Return JSON only: {"mealTitle":"...","totalCalories":0,"totalProteinG":0,"totalCarbsG":0,"totalFatG":0,"totalSugarG":0,"totalFiberG":0,"emoji":"🍔","ingredients":[{"name":"...","calories":0,"proteinG":0,"carbsG":0,"fatG":0,"sugarG":0,"fiberG":0,"servings":1}],"summary":"..."}`
    : `Analyze: "${description}". Return JSON only: {"mealTitle":"...","totalCalories":0,"totalProteinG":0,"totalCarbsG":0,"totalFatG":0,"totalSugarG":0,"totalFiberG":0,"emoji":"🍔","ingredients":[{"name":"...","calories":0,"proteinG":0,"carbsG":0,"fatG":0,"sugarG":0,"fiberG":0,"servings":1}],"summary":"..."}`;
  const contentArr = [];
  if (imageData) contentArr.push({ type:"image_url", image_url:{ url:`data:${imageData.mimeType};base64,${imageData.base64}`, detail:"high" }});
  contentArr.push({ type:"text", text:userPrompt });
  const res = await fetch("https://api.openai.com/v1/chat/completions", {
    method:"POST",
    headers:{"Content-Type":"application/json","Authorization":`Bearer ${apiKey}`},
    body:JSON.stringify({ model:"gpt-4o", messages:[{role:"system",content:"You are an expert nutritionist. Return ONLY raw JSON. For each ingredient include servings (default 1)."},{role:"user",content:contentArr}], max_tokens:1000 })
  });
  if (!res.ok) { let m=`API error ${res.status}`; try{const e=await res.json();m=e.error?.message||m;}catch{} if(res.status===401)throw new Error("Invalid API key"); if(res.status===429)throw new Error("Rate limited"); throw new Error(m); }
  const data = await res.json();
  const raw = (data.choices?.[0]?.message?.content||"").trim().replace(/```json\s*/gi,"").replace(/```/g,"").trim();
  try{return JSON.parse(raw);}catch{const m=raw.match(/\{[\s\S]*\}/);if(m)return JSON.parse(m[0]);throw new Error("Unexpected response");}
}

// Merge known food DB data into freshly analyzed ingredients
function mergeWithFoodDB(ingredients) {
  return (ingredients||[]).map(ing => {
    const known = getFoodFromDB(ing.name);
    if (known) {
      return { ...ing, ...known, name: ing.name, servings: known.servings || ing.servings || 1 };
    }
    return { ...ing, servings: ing.servings || 1 };
  });
}

async function aiChat(apiKey, widgetConfig, messages, userMsg) {
  // Uses Claude via Anthropic API (no key needed for config changes)
  // For general chat we use Claude; for analyze we use OpenAI
  const regDesc = WIDGET_REGISTRY.map(w=>`- ${w.id}: "${w.label}" — ${w.desc}`).join("\n");
  const sys = `You are an AI assistant inside a calorie tracking app called "Just Calories". You can help with:
1. Customizing the app layout (adding/removing widgets)
2. Answering nutrition questions
3. Logging food (return a special JSON block)
4. General health/calorie questions

AVAILABLE WIDGETS:\n${regDesc}
CURRENT CONFIG:\n${JSON.stringify(widgetConfig,null,2)}

When the user wants to customize layout, return JSON: {"type":"config","reply":"...", "configChanges":{"visible":[...],"order":[...]}}
When the user wants to log food, return JSON: {"type":"log_food","reply":"...","food":{"mealTitle":"...","totalCalories":0,"totalProteinG":0,"totalCarbsG":0,"totalFatG":0,"ingredients":[{"name":"...","calories":0,"proteinG":0,"carbsG":0,"fatG":0,"servings":1}]}}
Otherwise return: {"type":"chat","reply":"..."}

Rules for config:
- meal_list always stays in visible/order
- Keep existing visible widgets unless user says remove

Always respond in JSON only.`;

  const res = await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      model:"claude-sonnet-4-20250514",
      max_tokens:800,
      system:sys,
      messages:[...messages.filter(m=>m.role!=="system").map(m=>({role:m.role==="ai"?"assistant":"user",content:m.text})),{role:"user",content:userMsg}]
    })
  });
  const data = await res.json();
  const raw = (data.content?.[0]?.text||"{}").trim().replace(/```json\s*/gi,"").replace(/```/g,"").trim();
  try{return JSON.parse(raw);}catch{const m=raw.match(/\{[\s\S]*\}/);if(m)return JSON.parse(m[0]);return{type:"chat",reply:"I'm here to help! Ask me anything about your nutrition or app layout."};}
}

// ─── UTILS ────────────────────────────────────────────────────────────────────
let _id = Date.now();
const uid = () => `m${++_id}`;

function makeThumbnail(base64,mimeType,size=120,quality=0.7) {
  return new Promise(resolve=>{
    try{const img=new Image();img.onload=()=>{const s=Math.min(size/img.width,size/img.height,1);const w=Math.round(img.width*s),h=Math.round(img.height*s);const c=document.createElement("canvas");c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);resolve(c.toDataURL("image/jpeg",quality).split(",")[1]);};img.onerror=()=>resolve(null);img.src=`data:${mimeType};base64,${base64}`;}catch{resolve(null);}
  });
}

function useWebSpeech(onUpdate) {
  const recRef=useRef(null);
  const [listening,setListening]=useState(false);
  const supported=!!(window.SpeechRecognition||window.webkitSpeechRecognition);
  const start=useCallback(()=>{if(!supported)return;try{const SR=window.SpeechRecognition||window.webkitSpeechRecognition;const rec=new SR();recRef.current=rec;rec.continuous=true;rec.interimResults=true;rec.lang="en-US";let final="";rec.onresult=e=>{let interim="";for(let i=e.resultIndex;i<e.results.length;i++){const t=e.results[i][0].transcript;if(e.results[i].isFinal)final+=t+" ";else interim=t;}onUpdate(final+interim);};rec.onerror=()=>setListening(false);rec.onend=()=>setListening(false);rec.start();setListening(true);}catch{setListening(false);}},[supported,onUpdate]);
  const stop=useCallback(()=>{try{recRef.current?.stop();}catch{}setListening(false);},[]);
  return{listening,supported,start,stop};
}

// ─── AI FLOATING BUTTON + DRAWER ─────────────────────────────────────────────
function AIDrawer({apiKey, widgetConfig, onConfigChange, onAddMeal, onClose}) {
  const [msgs,setMsgs]=useState([{role:"ai",text:"Hi! I can help you customize your layout, log food, or answer nutrition questions. What would you like to do?"}]);
  const [input,setInput]=useState("");
  const [loading,setLoading]=useState(false);
  const chatRef=useRef();
  const speech=useWebSpeech(useCallback(t=>setInput(t),[]));
  useEffect(()=>{if(chatRef.current)chatRef.current.scrollTop=chatRef.current.scrollHeight;},[msgs]);

  const send = async() => {
    const msg=input.trim();if(!msg)return;
    speech.stop();setInput("");
    const newMsgs=[...msgs,{role:"user",text:msg}];
    setMsgs(newMsgs);
    setLoading(true);
    try{
      const result = await aiChat(apiKey, widgetConfig, msgs, msg);
      if(result.type==="config" && result.configChanges){
        const next={...widgetConfig,...result.configChanges,options:{...widgetConfig.options,...(result.configChanges.options||{})}};
        if(!next.visible.includes("meal_list"))next.visible.push("meal_list");
        if(!next.order.includes("meal_list"))next.order.push("meal_list");
        onConfigChange(next);
      }
      if(result.type==="log_food" && result.food && onAddMeal){
        const now=new Date();
        const ings = mergeWithFoodDB(result.food.ingredients||[]);
        onAddMeal({
          id:uid(), mealTitle:result.food.mealTitle, totalCalories:result.food.totalCalories,
          totalProteinG:result.food.totalProteinG||0, totalCarbsG:result.food.totalCarbsG||0,
          totalFatG:result.food.totalFatG||0, totalSugarG:0, totalFiberG:0,
          ingredients:ings, summary:"Added via AI", imageBase64:null,
          time:now.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"}),
          addedAt:now.getTime(), emoji:"🤖"
        });
      }
      setMsgs([...newMsgs,{role:"ai",text:result.reply||"Done!"}]);
    }catch(e){
      setMsgs([...newMsgs,{role:"ai",text:`Sorry, couldn't connect. ${e.message||""}`}]);
    }
    setLoading(false);
  };

  return <div style={{position:"fixed",inset:0,zIndex:500,display:"flex",flexDirection:"column",justifyContent:"flex-end"}}>
    <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.5)"}} onClick={onClose}/>
    <div style={{position:"relative",background:C.surface,borderRadius:"24px 24px 0 0",border:`1px solid ${C.border}`,borderBottom:"none",display:"flex",flexDirection:"column",maxHeight:"80vh"}}>
      <div style={{padding:"12px 16px 8px",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:`1px solid ${C.border}`,flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:28,height:28,borderRadius:"50%",background:C.aDim,border:`1px solid ${C.aMid}`,display:"flex",alignItems:"center",justifyContent:"center"}}><Ic.Sparkles s={13}/></div>
          <span style={{fontSize:14,fontWeight:500,color:C.text}}>AI Assistant</span>
        </div>
        <button onClick={onClose} style={{background:"none",border:"none",color:C.dim,fontSize:20,lineHeight:1,padding:"4px 8px"}}>×</button>
      </div>
      <div ref={chatRef} style={{flex:1,overflowY:"auto",padding:"12px 16px",display:"flex",flexDirection:"column",gap:10,minHeight:200}}>
        {msgs.map((m,i)=>(
          <div key={i} style={{display:"flex",flexDirection:m.role==="user"?"row-reverse":"row",gap:8,alignItems:"flex-end"}}>
            {m.role==="ai"&&<div style={{width:22,height:22,borderRadius:"50%",background:C.aDim,border:`1px solid ${C.aMid}`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Ic.Sparkles s={11}/></div>}

// ─── WEIGHT CHART (sparkline, tight range) ───────────────────────────────────
function WeightSparkline({data, width=110, height=36, color=C.accent}) {
  if(!data||data.length<2) return <div style={{width,height,display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{fontSize:10,color:C.dim}}>no data</span></div>;
  const vals=data.map(d=>d.value);
  // Tight range: min/max with small padding
  const rawMin=Math.min(...vals), rawMax=Math.max(...vals);
  const pad=Math.max((rawMax-rawMin)*0.3, 1);
  const mn=rawMin-pad, mx=rawMax+pad, range=mx-mn;
  const P=3;
  const tx=i=>P+(i/Math.max(data.length-1,1))*(width-P*2);
  const ty=v=>P+(1-(v-mn)/range)*(height-P*2);
  const pts=data.map((d,i)=>`${tx(i)},${ty(d.value)}`).join(" ");
  const trend=data[data.length-1].value<=data[0].value;
  const lineColor=trend?C.accent:C.red;
  return <svg width={width} height={height} style={{overflow:"visible",flexShrink:0}}>
    <polyline points={pts} fill="none" stroke={lineColor} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" opacity="0.85"/>
    <circle cx={tx(data.length-1)} cy={ty(data[data.length-1].value)} r="3" fill={lineColor}/>
  </svg>;
}

function WeightLogScreen({onBack, aiProps}) {
  const [wlog,setWlog]=useState(()=>loadWeights());
  const [editing,setEditing]=useState(null); // date string being edited
  const [editVal,setEditVal]=useState("");
  const [confirmDel,setConfirmDel]=useState(null);
  const sixMonthsAgo=new Date();sixMonthsAgo.setMonth(sixMonthsAgo.getMonth()-6);
  const chartData=wlog.filter(w=>new Date(w.date)>=sixMonthsAgo);

  const commitEdit=(date)=>{const n=parseFloat(editVal);if(!isNaN(n)&&n>0){const next=wlog.map(w=>w.date===date?{...w,value:n}:w);setWlog(next);saveWeights(next);}setEditing(null);};
  const deleteEntry=(date)=>{const next=wlog.filter(w=>w.date!==date);setWlog(next);saveWeights(next);setConfirmDel(null);};

  const addToday=()=>{
    const today=fmtKey(new Date());
    const latest=wlog.length>0?wlog[wlog.length-1].value:0;
    const next=[...wlog.filter(w=>w.date!==today),{date:today,value:latest||0}].sort((a,b)=>a.date.localeCompare(b.date));
    setWlog(next);saveWeights(next);
    setEditing(today);setEditVal(latest>0?String(latest):"");
  };

  return <div style={{height:"100%",display:"flex",flexDirection:"column",background:C.bg}}>
    <TopBar title="Weight History" onBack={onBack} rightEl={<AIButton {...aiProps}/>}/>
    <div style={{flex:1,overflowY:"auto",padding:"12px 16px 24px"}}>

        <div style={{fontSize:10,color:C.dim,textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:10}}>Last 6 Months</div>
        <WeightSparkline data={chartData} width="100%" height={60}/>
        {/* full-width sparkline */}
        <svg width="100%" height={60} style={{display:"block"}}>
          {(()=>{
            const vals=chartData.map(d=>d.value);
            const rawMin=Math.min(...vals),rawMax=Math.max(...vals);
            const pad=Math.max((rawMax-rawMin)*0.3,1);
            const mn=rawMin-pad,mx=rawMax+pad,range=mx-mn;
            const P=4;
            const W=300,H=60;
            const tx=i=>P+(i/Math.max(chartData.length-1,1))*(W-P*2);
            const ty=v=>P+(1-(v-mn)/range)*(H-P*2);
            const pts=chartData.map((d,i)=>`${tx(i)},${ty(d.value)}`).join(" ");
            const trend=chartData[chartData.length-1].value<=chartData[0].value;
            return <>
              <polyline points={pts} fill="none" stroke={trend?C.accent:C.red} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
              {chartData.map((d,i)=><circle key={i} cx={tx(i)} cy={ty(d.value)} r="2.5" fill={trend?C.accent:C.red} opacity="0.6"/>)}
              <circle cx={tx(chartData.length-1)} cy={ty(chartData[chartData.length-1].value)} r="4" fill={trend?C.accent:C.red}/>
              {/* labels */}
              <text x={P} y={H-2} fontSize="9" fill={C.dim}>{chartData[0]?.date?.slice(5)}</text>
              <text x={W-P} y={H-2} fontSize="9" fill={C.dim} textAnchor="end">{chartData[chartData.length-1]?.date?.slice(5)}</text>
            </>;
          })()}
        </svg>
      </Card>}

      <button onClick={addToday} style={{width:"100%",background:C.aDim,border:`1px solid ${C.aMid}`,borderRadius:12,color:C.accent,fontSize:14,fontWeight:400,padding:"12px",marginBottom:10,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
        <Ic.Plus s={16}/> Log today's weight

      <Card>
        {[...wlog].reverse().map((entry,i)=>(
          <div key={entry.date} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",borderBottom:i<wlog.length-1?`1px solid ${C.border}`:"none"}}>
            <div style={{flex:1}}>
              <div style={{fontSize:11,color:C.sub,marginBottom:2}}>{new Date(entry.date+"T12:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"})}</div>

                ?<input autoFocus type="number" inputMode="decimal" style={{background:"transparent",border:"none",borderBottom:`1.5px solid ${C.accent}`,color:C.text,fontSize:18,fontWeight:300,fontFamily:"'Inter',sans-serif",outline:"none",padding:0,width:80}} value={editVal} onChange={e=>setEditVal(e.target.value)} onBlur={()=>commitEdit(entry.date)} onKeyDown={e=>e.key==="Enter"&&commitEdit(entry.date)}/>
                :<div style={{fontSize:18,fontWeight:300,color:C.text,letterSpacing:"-0.5px",cursor:"pointer",display:"flex",alignItems:"center",gap:6}} onClick={()=>{setEditing(entry.date);setEditVal(String(entry.value));}}>{entry.value} <span style={{fontSize:11,color:C.dim}}>lbs</span><Ic.Edit s={11}/></div>

function MealRow({meal,onTap,onDelete,onQuickEdit}) {

  const commit=()=>{const n=parseInt(val);if(!isNaN(n)&&n>=0)onQuickEdit(meal.id,n);else setVal(String(meal.totalCalories));setEditing(false);};
  const onTS=e=>{txRef.current=e.touches[0].clientX;tyRef.current=e.touches[0].clientY;setSwiping(false);};
  const onTM=e=>{const dx=e.touches[0].clientX-txRef.current;const dy=Math.abs(e.touches[0].clientY-tyRef.current);if(dy>20&&Math.abs(dx)<20)return;if(dx<0){setSwiping(true);setSwipeX(Math.max(dx,-88));}};
  const onTE=()=>{if(swipeX<=-80)onDelete(meal.id);else{setSwipeX(0);setSwiping(false);}};

      {meal.imageBase64
        ?<img src={`data:${meal.imageMime||"image/jpeg"};base64,${meal.imageBase64}`} style={{width:44,height:44,borderRadius:9,objectFit:"cover",flexShrink:0}} alt=""/>

      }
      <div style={{flex:1,minWidth:0}}>

          :<><span style={{fontSize:14,fontWeight:400,color:isW?C.orange:C.accent,letterSpacing:"-0.3px"}}>{isW?"-":""}{meal.totalCalories}</span><span style={{fontSize:9,color:isW?"rgba(255,149,0,0.5)":"rgba(74,230,138,0.5)",marginLeft:1}}>kcal</span></>
        }

}

// ─── RENDER WIDGET ────────────────────────────────────────────────────────────
function renderWidget(id,ctx) {
  const {meals,goal,baseGoal,setBaseGoal,onSelectMeal,onAddWorkout,onOpenVoice,fileRef,widgetConfig,onOpenWeightLog}=ctx;
  const opts=widgetConfig.options?.[id]||{};
  switch(id){

}

function HomeScreen({onOpenCamera,onOpenVoice,onSelectMeal,onAddWorkout,onOpenSettings,meals,goal,baseGoal,setBaseGoal,date,setDate,widgetConfig,onConfigChange,onOpenWeightLog,aiProps}) {
  const fileRef=useRef();
  const handleFile=e=>{
    const f=e.target.files[0];if(!f)return;
    const reader=new FileReader();
    reader.onload=ev=>{const img=new Image();img.onload=()=>{const MAX=1600;let w=img.width,h=img.height;if(w>MAX||h>MAX){const s=Math.min(MAX/w,MAX/h);w=Math.round(w*s);h=Math.round(h*s);}const canvas=document.createElement("canvas");canvas.width=w;canvas.height=h;canvas.getContext("2d").drawImage(img,0,0,w,h);const dataUrl=canvas.toDataURL("image/jpeg",.88);onOpenCamera({base64:dataUrl.split(",")[1],mimeType:"image/jpeg"},dataUrl);};img.src=ev.target.result;};
    reader.readAsDataURL(f);e.target.value="";
  };
  const shift=days=>{const d=new Date(date);d.setDate(d.getDate()+days);setDate(d);};
  const ctx={meals,goal,baseGoal,setBaseGoal,onSelectMeal,onAddWorkout,onOpenVoice,fileRef,widgetConfig,onOpenWeightLog};
  const visibleOrdered=widgetConfig.order.filter(id=>widgetConfig.visible.includes(id));

  return <div style={{height:"100%",background:C.bg,display:"flex",flexDirection:"column",overflow:"hidden"}}>
    {/* Top header */}
    <div style={{padding:`${SAT} 16px 10px`,background:C.surface,borderBottom:`1px solid ${C.border}`,flexShrink:0}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
        <span style={{fontSize:11,fontWeight:300,color:C.dim,letterSpacing:"1.5px",textTransform:"uppercase"}}>Just Calories</span>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <AIButton {...aiProps}/>
          <button style={{width:36,height:36,borderRadius:10,background:C.hover,border:`1px solid ${C.border}`,color:C.sub,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={onOpenSettings}><Ic.Gear/></button>
        </div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:6}}>
        <button style={{width:30,height:30,borderRadius:8,background:C.hover,border:`1px solid ${C.border}`,color:C.sub,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>shift(-1)}><Ic.Left/></button>
        <div style={{flex:1,textAlign:"center"}}>
          <div style={{fontSize:13,fontWeight:400,color:C.text}}>{fmtDisplay(date)}</div>
          {!isToday(date)&&<button style={{background:C.aDim,border:`1px solid ${C.aMid}`,color:C.accent,borderRadius:20,fontSize:9,fontWeight:500,padding:"2px 8px",marginTop:1}} onClick={()=>setDate(new Date())}>Today</button>}
        </div>
        <button style={{width:30,height:30,borderRadius:8,background:C.hover,border:`1px solid ${C.border}`,color:C.sub,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>shift(1)}><Ic.Right/></button>
      </div>
    </div>
    <input ref={fileRef} type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={handleFile}/>
    <div style={{flex:1,overflowY:"auto",padding:"12px 16px 20px",WebkitOverflowScrolling:"touch"}}>
      {visibleOrdered.map((id,idx)=>{
        const widget=renderWidget(id,ctx);
        if(!widget)return null;
        return <div key={id} style={{marginBottom:8,animation:"widgetIn .3s cubic-bezier(.34,1.36,.64,1) both"}}>{widget}</div>;
      })}
    </div>
  </div>;
}

// ─── INGREDIENT DETAIL SCREEN ─────────────────────────────────────────────────
function IngredientDetailScreen({ingredient, mealId, onBack, onSave, onDelete}) {
  const [ing, setIng] = useState({...ingredient});
  const [editField, setEditField] = useState(null);
  const [editVal, setEditVal] = useState("");
  const [confirmDel, setConfirmDel] = useState(false);

  const fields = [
    {key:"servings", label:"Servings", unit:""},
    {key:"calories", label:"Calories", unit:"kcal"},
    {key:"proteinG", label:"Protein", unit:"g"},
    {key:"carbsG",   label:"Carbs",   unit:"g"},
    {key:"fatG",     label:"Fat",     unit:"g"},
    {key:"sugarG",   label:"Sugar",   unit:"g"},
    {key:"fiberG",   label:"Fiber",   unit:"g"},
  ];

  const startEdit=(field,val)=>{ setEditField(field); setEditVal(String(val??0)); };
  const commitEdit=(field)=>{
    const n=parseFloat(editVal);
    if(!isNaN(n)&&n>=0){
      const updated={...ing,[field]:n};
      // If servings changed, scale all macros
      if(field==="servings"&&ing.servings>0){
        const ratio=n/ing.servings;
        updated.calories=Math.round((ing.calories||0)*ratio);
        updated.proteinG=parseFloat(((ing.proteinG||0)*ratio).toFixed(1));
        updated.carbsG=parseFloat(((ing.carbsG||0)*ratio).toFixed(1));
        updated.fatG=parseFloat(((ing.fatG||0)*ratio).toFixed(1));
        updated.sugarG=parseFloat(((ing.sugarG||0)*ratio).toFixed(1));
        updated.fiberG=parseFloat(((ing.fiberG||0)*ratio).toFixed(1));
      }
      setIng(updated);
    }
    setEditField(null);
  };

  const save=()=>{ onSave(ing); recordFoodToDB(ing); };

  return <div style={{height:"100%",display:"flex",flexDirection:"column",background:C.bg}}>
    <TopBar title={ing.name} onBack={onBack}/>
    <div style={{flex:1,overflowY:"auto",padding:"12px 16px 24px"}}>
      <Card>
        {fields.map((f,i)=>(
          <div key={f.key} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 16px",borderBottom:i<fields.length-1?`1px solid ${C.border}`:"none"}}>
            <span style={{fontSize:14,fontWeight:300,color:C.text}}>{f.label}</span>
            {editField===f.key
              ?<input autoFocus type="number" inputMode="decimal" style={{width:90,background:"transparent",border:"none",borderBottom:`1.5px solid ${C.accent}`,color:C.accent,fontSize:15,fontWeight:400,textAlign:"right",outline:"none",fontFamily:"'Inter',sans-serif"}} value={editVal} onChange={e=>setEditVal(e.target.value)} onBlur={()=>commitEdit(f.key)} onKeyDown={e=>e.key==="Enter"&&commitEdit(f.key)}/>
              :<div style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer"}} onClick={()=>startEdit(f.key,ing[f.key])}>
                <span style={{fontSize:15,fontWeight:300,color:C.accent}}>{ing[f.key]??0}{f.unit}</span>
                <Ic.Edit s={12}/>
              </div>
            }
          </div>
        ))}
      </Card>
      <button onClick={save} style={{width:"100%",background:C.accent,border:"none",borderRadius:12,color:C.bg,fontSize:14,fontWeight:500,padding:"13px",marginTop:12}}>Save Changes</button>
      <button onClick={()=>setConfirmDel(true)} style={{width:"100%",background:C.rDim,border:`1px solid ${C.rMid}`,borderRadius:12,color:C.red,fontSize:14,fontWeight:400,padding:"13px",marginTop:8}}>Remove from all meals</button>
      {confirmDel&&<div style={{marginTop:8,background:C.hover,borderRadius:12,padding:"14px"}}>
        <p style={{color:C.text,fontSize:13,marginBottom:10}}>Remove "{ing.name}" from this meal and food history?</p>
        <div style={{display:"flex",gap:8}}>
          <button style={{flex:1,background:"transparent",border:`1px solid ${C.border}`,borderRadius:10,color:C.sub,fontSize:13,padding:"10px"}} onClick={()=>setConfirmDel(false)}>Cancel</button>
          <button style={{flex:1,background:C.red,border:"none",borderRadius:10,color:"#fff",fontSize:13,padding:"10px"}} onClick={()=>onDelete(ing.name)}>Remove</button>
        </div>
      </div>}
    </div>
  </div>;
}

// ─── DETAIL SCREEN ────────────────────────────────────────────────────────────
function DetailScreen({meal,onBack,onUpdate,onDelete,apiKey,onOpenIngredient}) {
  const [ings,setIngs]=useState(meal.ingredients||[]);
  const [editTotal,setEditTotal]=useState(false);
  const [totalVal,setTotalVal]=useState(String(meal.totalCalories));
  const [addingVoice,setAddingVoice]=useState(false);
  const [addTranscript,setAddTranscript]=useState("");
  const [addError,setAddError]=useState("");
  const [addLoading,setAddLoading]=useState(false);
  const [confirmDelete,setConfirmDelete]=useState(false);
  const isW=meal.type==="workout";
  const onUpd2=useCallback(t=>setAddTranscript(t),[]);
  const speech=useWebSpeech(onUpd2);
  useEffect(()=>()=>speech.stop(),[]);

  // Recalculate total from ingredients
  const recalcTotal=(newIngs)=>{
    const tot=newIngs.reduce((s,x)=>s+(x.calories||0),0);
    const prot=newIngs.reduce((s,x)=>s+(x.proteinG||0),0);
    const carbs=newIngs.reduce((s,x)=>s+(x.carbsG||0),0);
    const fat=newIngs.reduce((s,x)=>s+(x.fatG||0),0);
    return {tot,prot,carbs,fat};
  };

  const commitTotal=()=>{const n=parseInt(totalVal);if(!isNaN(n)&&n>=0)onUpdate({...meal,totalCalories:n,ingredients:ings});else setTotalVal(String(meal.totalCalories));setEditTotal(false);};

  const mergeItems=async()=>{if(!addTranscript.trim())return;speech.stop();setAddLoading(true);setAddError("");
    try{const r=await analyze(apiKey,null,addTranscript);
      const rawIngs=r.ingredients||[{name:r.mealTitle,calories:r.totalCalories,proteinG:r.totalProteinG||0,carbsG:r.totalCarbsG||0,fatG:r.totalFatG||0,sugarG:0,fiberG:0,servings:1}];
      const merged=mergeWithFoodDB(rawIngs);
      const newIngs=[...ings,...merged];
      const {tot,prot,carbs,fat}=recalcTotal(newIngs);
      setIngs(newIngs);setTotalVal(String(tot));
      onUpdate({...meal,totalCalories:tot,totalProteinG:prot,totalCarbsG:carbs,totalFatG:fat,ingredients:newIngs});
      setAddTranscript("");setAddingVoice(false);
    }catch(e){setAddError(e.message||"Error");}
    setAddLoading(false);
  };

  const handleIngredientSave=(idx,updatedIng)=>{
    const newIngs=ings.map((x,i)=>i===idx?updatedIng:x);
    setIngs(newIngs);
    const {tot,prot,carbs,fat}=recalcTotal(newIngs);
    setTotalVal(String(tot));
    onUpdate({...meal,totalCalories:tot,totalProteinG:prot,totalCarbsG:carbs,totalFatG:fat,ingredients:newIngs});
    recordFoodToDB(updatedIng);
  };

  const handleIngredientDelete=(idx,ingName)=>{
    const newIngs=ings.filter((_,i)=>i!==idx);
    setIngs(newIngs);
    const {tot,prot,carbs,fat}=recalcTotal(newIngs);
    onUpdate({...meal,totalCalories:tot,totalProteinG:prot,totalCarbsG:carbs,totalFatG:fat,ingredients:newIngs});
    // remove from food db
    const db=loadFoodDB();delete db[ingName?.toLowerCase()?.trim()];saveFoodDB(db);
  };

  // Swipeable ingredient row
  function IngRow({ing,idx,onTap,onDelete}) {
    const [sx,setSx]=useState(0);const [sw,setSw]=useState(false);
    const tx=useRef(0),ty=useRef(0);
    const onTS=e=>{tx.current=e.touches[0].clientX;ty.current=e.touches[0].clientY;setSw(false);};
    const onTM=e=>{const dx=e.touches[0].clientX-tx.current;const dy=Math.abs(e.touches[0].clientY-ty.current);if(dy>20&&Math.abs(dx)<20)return;if(dx<0){setSw(true);setSx(Math.max(dx,-88));}};
    const onTE=()=>{if(sx<=-80)onDelete();else{setSx(0);setSw(false);}};
    return <div style={{position:"relative",borderBottom:`1px solid ${C.border}`}}>
      <div style={{position:"absolute",inset:0,background:C.red,display:"flex",alignItems:"center",justifyContent:"flex-end",paddingRight:16}}>
        <span style={{color:"#fff",fontSize:11,fontWeight:500}}>Delete</span>
      </div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",background:C.surface,transform:`translateX(${sx}px)`,transition:sw?"none":"transform .25s ease",cursor:"pointer"}}
        onClick={()=>sx===0&&onTap()} onTouchStart={onTS} onTouchMove={onTM} onTouchEnd={onTE}>
        <div style={{flex:1,minWidth:0}}>
          <span style={{fontSize:13,fontWeight:300,color:C.text}}>{ing.name}</span>
          {ing.servings>0&&<span style={{fontSize:10,color:C.dim,marginLeft:6}}>{ing.servings} serving{ing.servings!==1?"s":""}</span>}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:12,fontWeight:400,color:C.accent}}>{ing.calories} kcal</div>
            {ing.proteinG>0&&<div style={{fontSize:10,color:C.blue}}>{ing.proteinG}g P</div>}
          </div>
          <Ic.ChevronRight s={14}/>
        </div>
      </div>
    </div>;
  }

  const macros=[
    {l:"Protein",v:Math.round(meal.totalProteinG||0),c:C.blue},
    {l:"Carbs",v:Math.round(meal.totalCarbsG||0),c:C.accent},
    {l:"Fat",v:Math.round(meal.totalFatG||0),c:C.orange},
    {l:"Sugar",v:Math.round(meal.totalSugarG||0),c:C.red},
    {l:"Fiber",v:Math.round(meal.totalFiberG||0),c:C.purple}
  ].filter(m=>m.v>0);

  return <div style={{height:"100%",display:"flex",flexDirection:"column",background:C.bg,overflow:"hidden"}}>
    <TopBar title={isW?"Workout":"Meal Detail"} onBack={onBack}/>
    <div style={{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch",paddingBottom:80}}>
      {!isW&&meal.imageBase64&&<img src={`data:${meal.imageMime||"image/jpeg"};base64,${meal.imageBase64}`} style={{width:"100%",height:180,objectFit:"cover"}} alt=""/>}
      {!isW&&!meal.imageBase64&&<div style={{width:"100%",height:120,background:C.surface,display:"flex",alignItems:"center",justifyContent:"center",fontSize:44}}>{meal.emoji||"🍽️"}</div>}
      {isW&&<div style={{width:"100%",height:100,background:C.oDim,display:"flex",alignItems:"center",justifyContent:"center",fontSize:44}}>🔥</div>}

      <div style={{padding:"14px 16px 0"}}>
        <h2 style={{fontSize:18,fontWeight:400,color:isW?C.orange:C.text,marginBottom:2}}>{meal.mealTitle}</h2>
        <p style={{fontSize:11,fontWeight:300,color:C.sub,lineHeight:1.5,marginBottom:2}}>{meal.summary}</p>
        <p style={{fontSize:10,color:C.dim,marginBottom:14}}>{meal.time}</p>

        <div style={{display:"flex",gap:10,marginBottom:12}}>
          <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 14px",background:isW?C.oDim:C.aDim,border:`1px solid ${isW?C.oMid:C.aMid}`,borderRadius:12,cursor:"pointer"}} onClick={()=>{setTotalVal(String(meal.totalCalories));setEditTotal(true);}}>
            <span style={{fontSize:11,color:C.sub}}>{isW?"Burned":"Calories"}</span>
            {editTotal
              ?<input autoFocus type="number" inputMode="numeric" style={{width:70,background:"transparent",border:"none",borderBottom:`1.5px solid ${isW?C.orange:C.accent}`,color:isW?C.orange:C.accent,fontSize:20,fontWeight:300,fontFamily:"'Inter',sans-serif",outline:"none",textAlign:"right"}} value={totalVal} onChange={e=>setTotalVal(e.target.value)} onBlur={commitTotal} onKeyDown={e=>e.key==="Enter"&&commitTotal()} onClick={e=>e.stopPropagation()}/>
              :<div style={{display:"flex",alignItems:"center",gap:3,color:isW?C.orange:C.accent}}><span style={{fontSize:20,fontWeight:300}}>{meal.totalCalories}</span><span style={{fontSize:9,opacity:.6}}>kcal</span><Ic.Edit s={10}/></div>
            }
          </div>

function PhotoScreen({apiKey,imageData,imagePreview,onBack,onAdd,aiProps}) {
  const [note,setNote]=useState("");const [error,setError]=useState("");const [submitting,setSubmitting]=useState(false);
  const submit=async()=>{setError("");setSubmitting(true);
    try{const r=await analyze(apiKey,imageData,note||undefined);
      const ings=mergeWithFoodDB(r.ingredients||[]);
      const now=new Date();
      onAdd({id:uid(),mealTitle:r.mealTitle,totalCalories:r.totalCalories,totalProteinG:r.totalProteinG||0,totalCarbsG:r.totalCarbsG||0,totalFatG:r.totalFatG||0,totalSugarG:r.totalSugarG||0,totalFiberG:r.totalFiberG||0,ingredients:ings,summary:r.summary,imageBase64:imageData?.base64||null,imageMime:imageData?.mimeType||"image/jpeg",time:now.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"}),addedAt:now.getTime(),emoji:r.emoji||null});
    }catch(e){setError(e.message||"Failed");setSubmitting(false);}
  };
  if(submitting&&!error)return <Spinner text="Analyzing with GPT-4o…"/>;
  return <div style={{height:"100%",background:C.bg,display:"flex",flexDirection:"column"}}>

    <div style={{flexShrink:0,padding:`0 16px ${SAB}`,display:"flex",flexDirection:"column",gap:8,paddingBottom:"calc(env(safe-area-inset-bottom,16px)+12px)"}}>
      <textarea style={{width:"100%",height:64,background:C.surface,border:`1px solid ${note?C.aMid:C.border}`,borderRadius:10,color:note?C.text:C.sub,fontSize:13,fontWeight:300,padding:"10px 13px",resize:"none",outline:"none",fontFamily:"'Inter',sans-serif",lineHeight:1.55}} placeholder="Add notes — ingredients, portions, brand…" value={note} onChange={e=>setNote(e.target.value)}/>
      {error&&<div style={{background:C.rDim,border:`1px solid ${C.rMid}`,borderRadius:9,padding:"10px 13px"}}><p style={{color:C.red,fontSize:13}}>{error}</p></div>}
      <button style={{width:"100%",background:C.accent,border:"none",borderRadius:11,color:C.bg,fontSize:15,fontWeight:500,padding:"13px"}} onClick={submit}>{error?"Retry →":"Analyze & Add →"}</button>
    </div>
  </div>;
}

function VoiceScreen({apiKey,onBack,onAdd,aiProps}) {
  const [transcript,setTranscript]=useState("");const [error,setError]=useState("");const [submitting,setSubmitting]=useState(false);
  const onUpdate=useCallback(t=>setTranscript(t),[]);
  const speech=useWebSpeech(onUpdate);
  useEffect(()=>{if(speech.supported)setTimeout(()=>speech.start(),200);return()=>speech.stop();},[]);
  const submit=async()=>{if(!transcript.trim())return;speech.stop();setSubmitting(true);
    try{const r=await analyze(apiKey,null,transcript);
      const ings=mergeWithFoodDB(r.ingredients||[]);
      const now=new Date();
      onAdd({id:uid(),mealTitle:r.mealTitle,totalCalories:r.totalCalories,totalProteinG:r.totalProteinG||0,totalCarbsG:r.totalCarbsG||0,totalFatG:r.totalFatG||0,totalSugarG:r.totalSugarG||0,totalFiberG:r.totalFiberG||0,ingredients:ings,summary:r.summary,imageBase64:null,time:now.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"}),addedAt:now.getTime(),emoji:r.emoji||"🍽️"});
    }catch(e){setError(e.message||"Error");setSubmitting(false);}
  };
  if(submitting)return <Spinner text="Calculating calories…"/>;
  return <div style={{height:"100%",background:C.bg,display:"flex",flexDirection:"column"}}>
    <TopBar title="Voice Log" onBack={()=>{speech.stop();onBack();}} rightEl={<AIButton {...aiProps}/>}/>
    <div style={{flex:1,overflowY:"auto",padding:"16px 18px 28px"}}>
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:12,paddingTop:8}}>
        <div onClick={speech.listening?speech.stop:speech.start} style={{width:80,height:80,borderRadius:"50%",background:speech.listening?"rgba(255,68,68,0.1)":C.aDim,border:`1.5px solid ${speech.listening?C.red:C.accent}`,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",transition:"all .3s",color:speech.listening?C.red:C.accent}}>
          {speech.listening?<Ic.Stop s={24}/>:<Ic.Mic s={32}/>}
        </div>
        <p style={{fontSize:13,fontWeight:300,color:speech.listening?C.red:C.sub,textAlign:"center"}}>{speech.listening?"Listening…":"Tap mic to speak"}</p>
      </div>
      <textarea style={{width:"100%",minHeight:96,background:C.surface,border:`1px solid ${transcript?C.aMid:C.border}`,borderRadius:12,color:transcript?C.text:C.sub,fontSize:14,fontWeight:300,padding:"12px 14px",resize:"none",outline:"none",fontFamily:"'Inter',sans-serif",lineHeight:1.65,marginTop:16}} placeholder="Words appear here as you speak, or type what you ate…" value={transcript} onChange={e=>setTranscript(e.target.value)}/>
      {error&&<p style={{color:C.red,fontSize:13,textAlign:"center",marginTop:10}}>{error}</p>}
      <div style={{display:"flex",gap:10,marginTop:14}}>
        {speech.listening&&<button style={{flexShrink:0,background:C.rDim,border:`1.5px solid ${C.red}`,borderRadius:11,color:C.red,fontSize:13,padding:"13px 12px",display:"flex",alignItems:"center",gap:5}} onClick={speech.stop}><Ic.Stop s={11}/> Stop</button>}
        <button style={{flex:1,background:C.accent,border:"none",borderRadius:11,color:C.bg,fontSize:14,fontWeight:500,padding:"13px",opacity:transcript.trim()?1:0.3}} onClick={submit} disabled={!transcript.trim()}>Add to Log →</button>
      </div>
    </div>
  </div>;
}

function SettingsScreen({apiKey,onSave,onBack,widgetConfig,onConfigChange,aiProps}) {
  const [val,setVal]=useState("");const [saved,setSaved]=useState(false);const [err,setErr]=useState("");
  const masked=apiKey?`${apiKey.slice(0,14)}…${apiKey.slice(-4)}`:null;
  const submit=()=>{const t=val.trim();if(!t){setErr("Please enter an API key");return;}onSave(t);setSaved(true);setVal("");setErr("");setTimeout(()=>setSaved(false),2500);};

  // Customize section
  const [custMsgs,setCustMsgs]=useState([{role:"ai",text:"Tell me what you want to add, remove, or rearrange."}]);
  const [custInput,setCustInput]=useState("");const [custLoading,setCustLoading]=useState(false);
  const custSend=async()=>{
    const msg=custInput.trim();if(!msg)return;
    setCustInput("");
    const newMsgs=[...custMsgs,{role:"user",text:msg}];setCustMsgs(newMsgs);setCustLoading(true);
    try{
      const result=await aiChat(apiKey,widgetConfig,custMsgs,msg);
      if(result.configChanges){
        const next={...widgetConfig,...result.configChanges,options:{...widgetConfig.options,...(result.configChanges.options||{})}};
        if(!next.visible.includes("meal_list"))next.visible.push("meal_list");
        if(!next.order.includes("meal_list"))next.order.push("meal_list");
        onConfigChange(next);
      }
      setCustMsgs([...newMsgs,{role:"ai",text:result.reply||"Done!"}]);
    }catch{setCustMsgs([...newMsgs,{role:"ai",text:"Couldn't reach AI. Check connection."}]);}
    setCustLoading(false);
  };

  return <div style={{height:"100%",display:"flex",flexDirection:"column",background:C.bg}}>
    <TopBar title="Settings" onBack={onBack} rightEl={<AIButton {...aiProps}/>}/>
    <div style={{flex:1,overflowY:"auto",padding:"12px 16px 32px",display:"flex",flexDirection:"column",gap:12}}>

      {/* Customize widgets */}
      <Card style={{padding:"14px"}}>
        <div style={{fontSize:12,fontWeight:500,color:C.text,marginBottom:4,display:"flex",alignItems:"center",gap:6}}><Ic.Sparkles s={13}/> Customize Layout</div>
        <p style={{fontSize:11,color:C.sub,marginBottom:10}}>Active: {widgetConfig.visible.map(id=>WIDGET_REGISTRY.find(r=>r.id===id)?.label||id).join(", ")}</p>
        <div style={{background:C.hover,borderRadius:10,padding:"10px 12px",marginBottom:8,maxHeight:140,overflowY:"auto",display:"flex",flexDirection:"column",gap:6}}>
          {custMsgs.map((m,i)=><div key={i} style={{display:"flex",flexDirection:m.role==="user"?"row-reverse":"row",gap:6}}>
            <div style={{maxWidth:"85%",padding:"6px 10px",borderRadius:10,background:m.role==="user"?C.accent:C.surface,border:`1px solid ${m.role==="user"?"transparent":C.border}`}}>
              <p style={{fontSize:12,fontWeight:300,color:m.role==="user"?"#0A0A0F":C.text,lineHeight:1.45}}>{m.text}</p>
            </div>
          </div>)}
          {custLoading&&<div style={{display:"flex",gap:3,padding:"4px 6px"}}>{[0,1,2].map(i=><div key={i} style={{width:4,height:4,borderRadius:"50%",background:C.accent,animation:"pulse 1s ease infinite",animationDelay:`${i*.2}s`}}/>)}</div>}
        </div>
        <div style={{display:"flex",gap:6}}>
          <input style={{flex:1,background:C.surface,border:`1px solid ${C.border}`,borderRadius:9,color:C.text,fontSize:13,fontWeight:300,padding:"8px 12px",outline:"none",fontFamily:"'Inter',sans-serif"}} placeholder="e.g. show all macros…" value={custInput} onChange={e=>setCustInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&custSend()}/>
          <button onClick={custSend} disabled={!custInput.trim()||custLoading} style={{width:34,height:34,borderRadius:"50%",background:custInput.trim()?C.accent:C.aDim,border:"none",color:custInput.trim()?"#0A0A0F":C.dim,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:16,fontWeight:600}}>↑</button>
        </div>
      </Card>

      <Card style={{padding:"16px"}}>
        <p style={{fontSize:13,fontWeight:400,color:C.text,marginBottom:6}}>OpenAI API Key</p>
        {masked?<div style={{display:"flex",alignItems:"center",gap:5,marginBottom:9,padding:"7px 9px",background:C.aDim,borderRadius:7,border:`1px solid ${C.aMid}`}}><span style={{fontSize:10,color:C.accent}}>✓</span><span style={{fontSize:11,color:C.sub,fontFamily:"monospace"}}>{masked}</span></div>:<p style={{fontSize:11,color:C.red,marginBottom:9}}>⚠ No key — meals cannot be analyzed</p>}
        <p style={{fontSize:11,color:C.sub,lineHeight:1.6,marginBottom:9}}>Get yours at <span style={{color:C.accent}}>platform.openai.com/api-keys</span></p>
        <input type="password" placeholder={masked?"New key to replace…":"sk-..."} value={val} onChange={e=>{setVal(e.target.value);setErr("");setSaved(false);}} onKeyDown={e=>e.key==="Enter"&&submit()} style={{width:"100%",background:C.hover,border:`1px solid ${err?C.red:C.border}`,borderRadius:9,color:C.text,fontSize:14,fontWeight:300,padding:"10px 12px",outline:"none",fontFamily:"'Inter',sans-serif",marginBottom:7}}/>
        {err&&<p style={{color:C.red,fontSize:11,marginBottom:7}}>{err}</p>}
        <button style={{width:"100%",background:saved?C.aDim:C.accent,border:saved?`1px solid ${C.aMid}`:"none",borderRadius:9,color:saved?C.accent:C.bg,fontSize:13,fontWeight:500,padding:"11px"}} onClick={submit}>{saved?"✓ Saved!":"Save Key"}</button>
      </Card>

      <Card style={{padding:"16px"}}>
        <p style={{fontSize:13,fontWeight:400,color:C.text,marginBottom:6}}>About</p>
        <p style={{fontSize:11,color:C.sub,lineHeight:1.7,fontWeight:300}}>Food photos analyzed by GPT-4o. Voice logging uses browser speech recognition. AI assistant uses Claude. All data stored on-device only.</p>
      </Card>
    </div>
  </div>;
}

// ─── ROOT ─────────────────────────────────────────────────────────────────────
function App() {
  const [apiKey,setApiKey]=useState(()=>loadKey());
  const [onboarded,setOnboardedState]=useState(()=>loadOnboarded());
  const [screen,setScreen]=useState("home"); // home, camera, voice, detail, settings, weightlog, ingredient
  const [baseGoal,setBaseGoal]=useState(()=>loadBaseGoal());
  const [selected,setSelected]=useState(null);  // selected meal
  const [selectedIng,setSelectedIng]=useState(null); // {ing, idx, onSave, onDelete}
  const [camImg,setCamImg]=useState({imageData:null,preview:null});
  const [widgetConfig,setWidgetConfig]=useState(()=>loadWidgetConfig());
  const [aiOpen,setAiOpen]=useState(false);
  const dateKeyRef=useRef(fmtKey(new Date()));
  const [,bump]=useState(0);

  const handleConfigChange=useCallback(cfg=>{setWidgetConfig(cfg);saveWidgetConfig(cfg);},[]);
  const dateKey=dateKeyRef.current;
  const meals=loadMeals(dateKey);
  const burned=meals.filter(m=>m.type==="workout").reduce((s,m)=>s+m.totalCalories,0);
  const effectiveGoal=baseGoal+burned;

  const changeDate=d=>{const k=fmtKey(d);if(k===dateKeyRef.current)return;dateKeyRef.current=k;bump(n=>n+1);};

  const addMeal=async m=>{
    (m.ingredients||[]).forEach(recordFoodToDB);
    const k=dateKeyRef.current;let s=m;
    if(m.imageBase64){const th=await makeThumbnail(m.imageBase64,m.imageMime||"image/jpeg",120,.7);s={...m,imageBase64:th||null};}
    saveMeals(k,[...loadMeals(k),s]);setScreen("home");bump(n=>n+1);
  };
  const addWorkout=w=>{const k=dateKeyRef.current;saveMeals(k,[...loadMeals(k),w]);bump(n=>n+1);};
  const updateMeal=m=>{
    (m.ingredients||[]).forEach(recordFoodToDB);
    const k=dateKeyRef.current;saveMeals(k,loadMeals(k).map(x=>x.id===m.id?m:x));
    setSelected(m);bump(n=>n+1);
  };
  const deleteMeal=id=>{const k=dateKeyRef.current;saveMeals(k,loadMeals(k).filter(x=>x.id!==id));setScreen("home");bump(n=>n+1);};
  const saveApiKey=k=>{saveKey(k);setApiKey(k);};

  const selectMeal=m=>{
    if(m._quickEdit){const k=dateKeyRef.current;saveMeals(k,loadMeals(k).map(x=>x.id===m.id?{...x,totalCalories:m._newCal}:x));bump(n=>n+1);return;}
    if(m._delete){const k=dateKeyRef.current;saveMeals(k,loadMeals(k).filter(x=>x.id!==m.id));bump(n=>n+1);return;}
    setSelected(m);setScreen("detail");
  };

  const openIngredient=(ing,idx,onSave,onDelete)=>{
    setSelectedIng({ing,idx,onSave,onDelete});
    setScreen("ingredient");
  };

  const aiProps = {onOpen:()=>setAiOpen(true)};

  if(!apiKey)return <ApiKeyScreen onSave={k=>{saveKey(k);setApiKey(k);}}/>;
  if(!onboarded)return <OnboardingScreen apiKey={apiKey} widgetConfig={widgetConfig} onConfigChange={handleConfigChange} onDone={()=>{setOnboarded();setOnboardedState(true);}}/>;

  return <div style={{height:"100%",display:"flex",flexDirection:"column",position:"relative"}}>
    <div style={{flex:1,overflow:"hidden"}}>
      {screen==="home"&&<HomeScreen
        onOpenCamera={(imageData,preview)=>{setCamImg({imageData,preview});setScreen("camera");}}
        onOpenVoice={()=>setScreen("voice")}
        onAddWorkout={addWorkout} onSelectMeal={selectMeal}
        onOpenSettings={()=>setScreen("settings")}
        meals={meals} goal={effectiveGoal} baseGoal={baseGoal} setBaseGoal={n=>{setBaseGoal(n);saveBaseGoal(n);}}
        date={new Date(dateKey+"T12:00:00")} setDate={changeDate}
        widgetConfig={widgetConfig} onConfigChange={handleConfigChange}
        onOpenWeightLog={()=>setScreen("weightlog")}
        aiProps={aiProps}
      />}
      {screen==="camera"&&<PhotoScreen apiKey={apiKey} imageData={camImg.imageData} imagePreview={camImg.preview} onBack={()=>setScreen("home")} onAdd={addMeal} aiProps={aiProps}/>}
      {screen==="voice"&&<VoiceScreen apiKey={apiKey} onBack={()=>setScreen("home")} onAdd={addMeal} aiProps={aiProps}/>}
      {screen==="detail"&&selected&&<DetailScreen meal={selected} onBack={()=>setScreen("home")} onUpdate={updateMeal} onDelete={deleteMeal} apiKey={apiKey} onOpenIngredient={openIngredient}/>}
      {screen==="ingredient"&&selectedIng&&<IngredientDetailScreen ingredient={selectedIng.ing} onBack={()=>setScreen("detail")} onSave={selectedIng.onSave} onDelete={selectedIng.onDelete}/>}
      {screen==="settings"&&<SettingsScreen apiKey={apiKey} onSave={saveApiKey} onBack={()=>setScreen("home")} widgetConfig={widgetConfig} onConfigChange={handleConfigChange} aiProps={aiProps}/>}
      {screen==="weightlog"&&<WeightLogScreen onBack={()=>setScreen("home")} aiProps={aiProps}/>}
    </div>
    {aiOpen&&<AIDrawer apiKey={apiKey} widgetConfig={widgetConfig} onConfigChange={handleConfigChange} onAddMeal={addMeal} onClose={()=>setAiOpen(false)}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
