<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

// ─── STORAGE ──────────────────────────────────────────────────────────────────
const ls = {
  get: k => { try { return localStorage.getItem(k); } catch { return null; } },
  set: (k,v) => { try { localStorage.setItem(k,v); return true; } catch { return false; } }
};
const fmtKey = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
const fmtDisplay = d => d.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});
const isToday = d => fmtKey(d) === fmtKey(new Date());
const loadMeals = d => { try { return JSON.parse(ls.get(`jct:m:${d}`) || "[]"); } catch { return []; } };
const saveMeals = (d,m) => ls.set(`jct:m:${d}`, JSON.stringify(m));
const loadBaseGoal = () => parseInt(ls.get("jct:basegoal") || "1600");
const saveBaseGoal = g => ls.set("jct:basegoal", String(g));
const loadKey = () => ls.get("jct:apikey") || "";
const saveKey = k => ls.set("jct:apikey", k);
const loadWeights = () => { try { return JSON.parse(ls.get("jct:weights") || "[]"); } catch { return []; } };
const saveWeights = w => ls.set("jct:weights", JSON.stringify(w));
const loadFoodHist = () => { try { return JSON.parse(ls.get("jct:foodhist") || "[]"); } catch { return []; } };
const saveFoodHist = a => ls.set("jct:foodhist", JSON.stringify(a));

// ─── WIDGET CONFIG ────────────────────────────────────────────────────────────

  { id:"calorie_ring",   label:"Calorie Ring",        desc:"Circular progress showing calories eaten vs goal", cat:"nutrition" },
  { id:"calorie_bar",    label:"Calorie Summary Bar",  desc:"Compact eaten / remaining / burned row", cat:"nutrition" },
  { id:"net_calories",   label:"Net Calories",         desc:"Eaten minus burned — net calorie view", cat:"nutrition" },
  { id:"macro_bars",     label:"Macro Bars",           desc:"Bars for protein, carbs, fat, sugar, fiber", cat:"nutrition" },
  { id:"protein_card",   label:"Protein Card",         desc:"Dedicated protein intake with progress bar", cat:"nutrition" },
  { id:"macro_pie",      label:"Macro Pie Chart",      desc:"Visual pie showing macro % breakdown", cat:"nutrition" },
  { id:"water_tracker",  label:"Water Tracker",        desc:"Tap cups to log daily water intake", cat:"wellness" },
  { id:"weight_widget",  label:"Weight + Trend",       desc:"Log daily weight with sparkline chart", cat:"wellness" },
  { id:"streak_counter", label:"Streak Counter",       desc:"Days logged in a row", cat:"wellness" },
  { id:"history_chart",  label:"7-Day History",        desc:"Bar chart of calorie intake over 7 days", cat:"trends" },
  { id:"note_of_day",    label:"Daily Note",           desc:"Free-text note for how you feel today", cat:"wellness" },
  { id:"meal_list",      label:"Meal Log",             desc:"Today's meals — always visible", cat:"logging", locked:true },
];

const DEFAULT_CONFIG = {
  visible: ["calorie_ring","weight_widget","meal_list"],
  order:   ["calorie_ring","weight_widget","meal_list"],
  options: { macro_bars:{ trackedMacros:["protein","carbs","fat"] } }
};
const loadWidgetConfig = () => { try { const s=ls.get("jct:wconfig"); if(s) return JSON.parse(s); } catch {} return DEFAULT_CONFIG; };
const saveWidgetConfig = c => ls.set("jct:wconfig", JSON.stringify(c));

// ─── COLORS ───────────────────────────────────────────────────────────────────
const C = {
  bg:"#0A0A0F", surface:"#13131A", hover:"#1C1C28", card:"#16161F",
  border:"rgba(255,255,255,0.07)",
  accent:"#4AE68A", aDim:"rgba(74,230,138,0.1)", aMid:"rgba(74,230,138,0.28)",
  text:"#F0F0F8", sub:"rgba(240,240,248,0.5)", dim:"rgba(240,240,248,0.22)",
  red:"#FF4444", rDim:"rgba(255,68,68,0.12)", rMid:"rgba(255,68,68,0.3)",
  orange:"#FF9500", oDim:"rgba(255,149,0,0.12)", oMid:"rgba(255,149,0,0.3)",
  blue:"#5AC8FA", bDim:"rgba(90,200,250,0.12)", bMid:"rgba(90,200,250,0.28)",
  purple:"#BF5AF2", pDim:"rgba(191,90,242,0.12)",
};

// ─── ICONS ────────────────────────────────────────────────────────────────────
const Ic = {
  Camera: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>,
  Mic: ({s=20}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="2" width="6" height="11" rx="3"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/></svg>,
  Stop: ({s=16}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="3"/></svg>,
  Left: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>,
  Right: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>,
  Back: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>,
  Trash: ({s=14}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>,
  Edit: ({s=12}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
  Gear: ({s=18}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
  Sparkles: ({s=16}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3L13.5 8.5L19 10L13.5 11.5L12 17L10.5 11.5L5 10L10.5 8.5L12 3z"/><path d="M19 3L19.75 5.25L22 6L19.75 6.75L19 9L18.25 6.75L16 6L18.25 5.25L19 3z"/><path d="M5 17L5.5 18.5L7 19L5.5 19.5L5 21L4.5 19.5L3 19L4.5 18.5L5 17z"/></svg>,
  Grip: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><circle cx="9" cy="7" r="1" fill="currentColor"/><circle cx="15" cy="7" r="1" fill="currentColor"/><circle cx="9" cy="12" r="1" fill="currentColor"/><circle cx="15" cy="12" r="1" fill="currentColor"/><circle cx="9" cy="17" r="1" fill="currentColor"/><circle cx="15" cy="17" r="1" fill="currentColor"/></svg>,
  Home: ({active}) => <svg width="22" height="22" viewBox="0 0 24 24" fill={active?"currentColor":"none"} stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
};

// ─── AI ANALYZE ───────────────────────────────────────────────────────────────
async function analyze(apiKey, imageData, description) {
  if (!apiKey) throw new Error("No API key — tap Settings");
  const userPrompt = imageData
    ? `Analyze this food image.${description?` Note: "${description}".`:""} Return JSON only: {"mealTitle":"...","totalCalories":0,"totalProteinG":0,"totalCarbsG":0,"totalFatG":0,"totalSugarG":0,"totalFiberG":0,"emoji":"🍔","ingredients":[{"name":"...","calories":0,"proteinG":0,"carbsG":0,"fatG":0}],"summary":"..."}`
    : `Analyze: "${description}". Return JSON only: {"mealTitle":"...","totalCalories":0,"totalProteinG":0,"totalCarbsG":0,"totalFatG":0,"totalSugarG":0,"totalFiberG":0,"emoji":"🍔","ingredients":[{"name":"...","calories":0,"proteinG":0,"carbsG":0,"fatG":0}],"summary":"..."}`;
  const contentArr = [];
  if (imageData) contentArr.push({ type:"image_url", image_url:{ url:`data:${imageData.mimeType};base64,${imageData.base64}`, detail:"high" }});
  contentArr.push({ type:"text", text:userPrompt });
  const res = await fetch("https://api.openai.com/v1/chat/completions", {
    method:"POST",
    headers:{"Content-Type":"application/json","Authorization":`Bearer ${apiKey}`},
    body:JSON.stringify({ model:"gpt-4o", messages:[{role:"system",content:"You are an expert nutritionist. Return ONLY raw JSON."},{role:"user",content:contentArr}], max_tokens:800 })
  });
  if (!res.ok) { let m=`API error ${res.status}`; try{const e=await res.json();m=e.error?.message||m;}catch{} if(res.status===401)throw new Error("Invalid API key"); if(res.status===429)throw new Error("Rate limited"); throw new Error(m); }
  const data = await res.json();
  const raw = (data.choices?.[0]?.message?.content||"").trim().replace(/```json\s*/gi,"").replace(/```/g,"").trim();
  try{return JSON.parse(raw);}catch{const m=raw.match(/\{[\s\S]*\}/);if(m)return JSON.parse(m[0]);throw new Error("Unexpected response");}
}

// ─── AI CONFIG ────────────────────────────────────────────────────────────────
async function aiConfigure(userMessage, currentConfig) {
  const regDesc = WIDGET_REGISTRY.map(w=>`- ${w.id}: "${w.label}" — ${w.desc}`).join("\n");
  const sys = `You are configuring a calorie tracking app. Parse what the user wants and return ONLY JSON.

AVAILABLE WIDGETS:\n${regDesc}

CURRENT CONFIG:\n${JSON.stringify(currentConfig,null,2)}

Return ONLY: {"reply":"1-2 sentence friendly confirmation","configChanges":{"visible":[...ids...],"order":[...same ids...],"options":{...}}}

RULES:
- "meal_list" is always in visible/order (it's locked)
- "show protein" → add macro_bars, set options.macro_bars.trackedMacros=["protein"]
- "show all macros" → macro_bars, trackedMacros=["protein","carbs","fat","sugar","fiber"]
- "add protein AND carbs" → trackedMacros=["protein","carbs"]
- "show graph/chart/history" → add history_chart
- "show water" → add water_tracker
- "show streak" → add streak_counter
- "net calories" → add net_calories
- "notes/note" → add note_of_day
- "remove X" → remove from visible+order
- "put X on top" → reorder, X first (after any locked top widget)
- Keep all currently visible widgets unless user says to remove one
- Reply like a helpful friend`;
  const res = await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:600,system:sys,messages:[{role:"user",content:userMessage}]})
  });
  const data = await res.json();
  const raw = (data.content?.[0]?.text||"{}").trim().replace(/```json\s*/gi,"").replace(/```/g,"").trim();
  try{return JSON.parse(raw);}catch{const m=raw.match(/\{[\s\S]*\}/);if(m)return JSON.parse(m[0]);return{reply:"Done! App updated.",configChanges:{}};}
}

// ─── UTILS ────────────────────────────────────────────────────────────────────
let _id = Date.now();
const uid = () => `m${++_id}`;
function recordFoodItems(ings) {
  if(!ings?.length)return;
  const ex=loadFoodHist(),map={};
  ex.forEach(f=>{map[f.name.toLowerCase()]=f;});
  ings.forEach(f=>{map[f.name.toLowerCase()]={name:f.name,calories:f.calories,proteinG:f.proteinG||0};});
  saveFoodHist(Object.values(map).slice(0,100));
}
function makeThumbnail(base64,mimeType,size=120,quality=0.7) {
  return new Promise(resolve=>{
    try{const img=new Image();img.onload=()=>{const s=Math.min(size/img.width,size/img.height,1);const w=Math.round(img.width*s),h=Math.round(img.height*s);const c=document.createElement("canvas");c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);resolve(c.toDataURL("image/jpeg",quality).split(",")[1]);};img.onerror=()=>resolve(null);img.src=`data:${mimeType};base64,${base64}`;}catch{resolve(null);}
  });
}
function useWebSpeech(onUpdate) {
  const recRef=useRef(null);
  const [listening,setListening]=useState(false);
  const supported=!!(window.SpeechRecognition||window.webkitSpeechRecognition);
  const start=useCallback(()=>{if(!supported)return;try{const SR=window.SpeechRecognition||window.webkitSpeechRecognition;const rec=new SR();recRef.current=rec;rec.continuous=true;rec.interimResults=true;rec.lang="en-US";let final="";rec.onresult=e=>{let interim="";for(let i=e.resultIndex;i<e.results.length;i++){const t=e.results[i][0].transcript;if(e.results[i].isFinal)final+=t+" ";else interim=t;}onUpdate(final+interim);};rec.onerror=()=>setListening(false);rec.onend=()=>setListening(false);rec.start();setListening(true);}catch{setListening(false);}},[supported,onUpdate]);
  const stop=useCallback(()=>{try{recRef.current?.stop();}catch{}setListening(false);},[]);
  return{listening,supported,start,stop};
}

// ─── SHARED UI ────────────────────────────────────────────────────────────────
function Spinner({text}) {
  return <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",gap:20,background:C.bg}}>
    <div style={{width:40,height:40,border:`2.5px solid ${C.border}`,borderTop:`2.5px solid ${C.accent}`,borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
    <p style={{fontSize:15,fontWeight:300,color:C.sub}}>{text}</p>
  </div>;
}
function Card({children,style={}}) {
  return <div style={{background:C.surface,borderRadius:16,border:`1px solid ${C.border}`,overflow:"hidden",...style}}>{children}</div>;
}

// ─── MACRO CONSTANTS ─────────────────────────────────────────────────────────
const MACRO_COLORS={protein:C.blue,carbs:C.accent,fat:C.orange,sugar:C.red,fiber:C.purple};
const MACRO_GOALS={protein:150,carbs:200,fat:60,sugar:50,fiber:25};

// ─── WIDGETS ──────────────────────────────────────────────────────────────────
function CalorieRingWidget({meals,goal,baseGoal,setBaseGoal}) {
  const [editGoal,setEditGoal]=useState(false);
  const [goalVal,setGoalVal]=useState(String(baseGoal));
  const eaten=meals.filter(m=>m.type!=="workout").reduce((s,m)=>s+m.totalCalories,0);
  const burned=meals.filter(m=>m.type==="workout").reduce((s,m)=>s+m.totalCalories,0);
  const protein=Math.round(meals.filter(m=>m.type!=="workout").reduce((s,m)=>s+(m.totalProteinG||0),0));
  const pct=Math.min(eaten/goal,1),C2=2*Math.PI*50,dash=C2*(1-pct);
  const ringColor=pct>1?C.red:pct>0.85?C.orange:C.accent;
  const rem=goal-eaten;
  const commit=()=>{const n=parseInt(goalVal);if(!isNaN(n)&&n>0){setBaseGoal(n);saveBaseGoal(n);}else setGoalVal(String(baseGoal));setEditGoal(false);};
  return <Card style={{padding:"20px"}}>
    <div style={{display:"flex",alignItems:"center",gap:18}}>
      <div style={{position:"relative",flexShrink:0}}>
        <svg width="108" height="108" viewBox="0 0 108 108">
          <circle cx="54" cy="54" r="50" fill="none" stroke={C.hover} strokeWidth="8" transform="rotate(-90,54,54)"/>
          <circle cx="54" cy="54" r="50" fill="none" stroke={ringColor} strokeWidth="8" strokeLinecap="round" strokeDasharray={C2} strokeDashoffset={dash} transform="rotate(-90,54,54)" style={{transition:"stroke-dashoffset .6s ease,stroke .3s"}}/>
        </svg>
        <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
          <span style={{fontSize:19,fontWeight:300,color:C.text,letterSpacing:"-0.5px"}}>{eaten.toLocaleString()}</span>
          <span style={{fontSize:9,color:C.dim,letterSpacing:"0.3px"}}>kcal</span>
        </div>
      </div>
      <div style={{flex:1,minWidth:0}}>
        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:14}}>
          <span style={{fontSize:10,color:C.dim,letterSpacing:"0.3px"}}>Goal:</span>
          {editGoal
            ?<input autoFocus type="number" inputMode="numeric" style={{background:"transparent",border:"none",borderBottom:`1.5px solid ${C.accent}`,color:C.text,fontSize:14,fontWeight:300,fontFamily:"'Inter',sans-serif",outline:"none",padding:0,width:60}} value={goalVal} onChange={e=>setGoalVal(e.target.value)} onBlur={commit} onKeyDown={e=>e.key==="Enter"&&commit()}/>
            :<span style={{fontSize:14,fontWeight:300,color:C.sub,cursor:"pointer"}} onClick={()=>{setGoalVal(String(baseGoal));setEditGoal(true);}}>{goal.toLocaleString()} kcal {burned>0&&<span style={{fontSize:10,color:C.orange}}>+{burned} burned</span>}</span>
          }
        </div>
        <div style={{display:"flex",gap:0}}>
          <div style={{flex:1}}>
            <div style={{fontSize:21,fontWeight:300,color:rem>=0?C.accent:C.red,letterSpacing:"-0.5px"}}>{Math.abs(rem).toLocaleString()}</div>
            <div style={{fontSize:10,color:C.dim,marginTop:1}}>{rem>=0?"remaining":"over"}</div>
          </div>
          <div style={{flex:1,paddingLeft:14,borderLeft:`1px solid ${C.border}`}}>
            <div style={{fontSize:21,fontWeight:300,color:C.blue,letterSpacing:"-0.5px"}}>{protein}g</div>
            <div style={{fontSize:10,color:C.dim,marginTop:1}}>protein</div>
          </div>
        </div>
      </div>
    </div>
  </Card>;
}

function CalorieSummaryBar({meals,goal}) {
  const eaten=meals.filter(m=>m.type!=="workout").reduce((s,m)=>s+m.totalCalories,0);
  const burned=meals.filter(m=>m.type==="workout").reduce((s,m)=>s+m.totalCalories,0);
  const rem=goal-eaten;
  return <Card>
    <div style={{display:"flex"}}>
      {[{l:"Eaten",v:eaten,c:C.text},{l:"Burned",v:burned,c:C.orange},{l:"Left",v:Math.abs(rem),c:rem>=0?C.accent:C.red}].map((x,i)=>(
        <div key={i} style={{flex:1,padding:"14px 0",textAlign:"center",borderRight:i<2?`1px solid ${C.border}`:"none"}}>
          <div style={{fontSize:18,fontWeight:300,color:x.c,letterSpacing:"-0.5px"}}>{x.v.toLocaleString()}</div>
          <div style={{fontSize:10,color:C.dim,marginTop:2}}>{x.l}</div>
        </div>
      ))}
    </div>
  </Card>;
}

function NetCaloriesCard({meals,goal}) {
  const eaten=meals.filter(m=>m.type!=="workout").reduce((s,m)=>s+m.totalCalories,0);
  const burned=meals.filter(m=>m.type==="workout").reduce((s,m)=>s+m.totalCalories,0);
  const net=eaten-burned;
  const good=net<=goal;
  return <Card style={{padding:"16px 18px"}}>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
      <div>
        <div style={{fontSize:10,color:C.dim,textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:4}}>Net Calories</div>
        <div style={{fontSize:26,fontWeight:200,color:good?C.accent:C.red,letterSpacing:"-1px"}}>{net.toLocaleString()}</div>
        <div style={{fontSize:11,color:C.dim,marginTop:2}}>eaten {eaten} − burned {burned}</div>
      </div>

function MacroPieChart({meals}) {

  const segs=[{l:"Protein",v:t.protein,c:C.blue},{l:"Carbs",v:t.carbs,c:C.accent},{l:"Fat",v:t.fat,c:C.orange}];
  const R=38,CX=50,CY=50;let cum=0;
  const arcs=segs.map(s=>{const pct=s.v/total,sa=-Math.PI/2+cum*2*Math.PI,ea=sa+pct*2*Math.PI;cum+=pct;const x1=CX+R*Math.cos(sa),y1=CY+R*Math.sin(sa),x2=CX+R*Math.cos(ea),y2=CY+R*Math.sin(ea);return{path:`M${x1},${y1} A${R},${R} 0 ${pct>.5?1:0},1 ${x2},${y2}`,color:s.c,pct,label:s.l};});
  return <Card style={{padding:"16px"}}>

// ─── DRAG-AND-DROP REORDER HOOK ───────────────────────────────────────────────
function useDragReorder(order, onReorder) {
  const dragIdx = useRef(null);
  const dragOverIdx = useRef(null);

  const onDragStart = useCallback((idx) => {
    dragIdx.current = idx;
  }, []);

  const onDragOver = useCallback((e, idx) => {
    e.preventDefault();
    dragOverIdx.current = idx;
  }, []);

  const onDrop = useCallback((e, idx) => {
    e.preventDefault();
    if (dragIdx.current === null || dragIdx.current === idx) { dragIdx.current=null; dragOverIdx.current=null; return; }
    const next = [...order];
    const [moved] = next.splice(dragIdx.current, 1);
    next.splice(idx, 0, moved);
    onReorder(next);
    dragIdx.current = null;
    dragOverIdx.current = null;
  }, [order, onReorder]);

  // Touch drag
  const touchStartY = useRef(0);
  const touchStartIdx = useRef(null);
  const onTouchStart = useCallback((e, idx) => {
    touchStartY.current = e.touches[0].clientY;
    touchStartIdx.current = idx;
  }, []);

  return { onDragStart, onDragOver, onDrop, onTouchStart };
}

    reader.readAsDataURL(f);e.target.value="";
  };
  const shift=days=>{const d=new Date(date);d.setDate(d.getDate()+days);setDate(d);};
  const ctx={meals,goal,baseGoal,setBaseGoal,onSelectMeal,onAddWorkout,onOpenVoice,fileRef,widgetConfig};
  const visibleOrdered=widgetConfig.order.filter(id=>widgetConfig.visible.includes(id));

  const handleReorder = useCallback(newOrder => {
    const next={...widgetConfig,order:newOrder};

      })}
    </div>
  </div>;
}

// ─── CUSTOMIZE SCREEN (TAB) ──────────────────────────────────────────────────
function CustomizeScreen({widgetConfig,onConfigChange}) {
  const [msgs,setMsgs]=useState([{role:"ai",text:"What do you want to see in your app?\n\nTell me what to add, remove, or rearrange. You can also drag widgets on the Today tab to reorder them."}]);
  const [input,setInput]=useState("");
  const [loading,setLoading]=useState(false);
  const speech=useWebSpeech(useCallback(t=>setInput(t),[]));
  const chatRef=useRef();
  useEffect(()=>{if(chatRef.current)chatRef.current.scrollTop=chatRef.current.scrollHeight;},[msgs]);

  const CHIPS=["Show protein & carbs","Show all macros","Add 7-day history","Add water tracker","Show streak","Add daily note","Show net calories","Remove weight widget"];

  const send=async()=>{
    const msg=input.trim();if(!msg)return;
    speech.stop();setInput("");
    setMsgs(p=>[...p,{role:"user",text:msg}]);
    setLoading(true);
    try{
      const result=await aiConfigure(msg,widgetConfig);
      if(result.configChanges&&Object.keys(result.configChanges).length>0){
        const next={...widgetConfig,...result.configChanges,options:{...widgetConfig.options,...(result.configChanges.options||{})}};
        // ensure meal_list always present
        if(!next.visible.includes("meal_list"))next.visible.push("meal_list");
        if(!next.order.includes("meal_list"))next.order.push("meal_list");
        onConfigChange(next);
      }
      setMsgs(p=>[...p,{role:"ai",text:result.reply||"Done!"}]);
    }catch{setMsgs(p=>[...p,{role:"ai",text:"Couldn't reach AI. Check your connection."}]);}
    setLoading(false);
  };

  return <div style={{height:"100%",display:"flex",flexDirection:"column",background:C.bg}}>
    <div style={{padding:"calc(env(safe-area-inset-top,44px) + 8px) 16px 10px",background:C.surface,borderBottom:`1px solid ${C.border}`,flexShrink:0}}>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <Ic.Sparkles s={14}/>
        <span style={{fontSize:15,fontWeight:500,color:C.text}}>Customize Your App</span>
      </div>
      {/* active widget pills */}
      <div style={{display:"flex",gap:5,flexWrap:"wrap",marginTop:8}}>
        {widgetConfig.visible.map(id=>{const w=WIDGET_REGISTRY.find(r=>r.id===id);return w?<span key={id} style={{fontSize:10,color:C.accent,background:C.aDim,border:`1px solid ${C.aMid}`,borderRadius:10,padding:"2px 7px",fontWeight:300}}>{w.label}</span>:null;})}
      </div>
    </div>
    <div ref={chatRef} style={{flex:1,overflowY:"auto",padding:"12px 16px",display:"flex",flexDirection:"column",gap:10}}>
      {msgs.map((m,i)=>(
        <div key={i} style={{display:"flex",flexDirection:m.role==="user"?"row-reverse":"row",gap:8,alignItems:"flex-end"}}>
          {m.role==="ai"&&<div style={{width:24,height:24,borderRadius:"50%",background:C.aDim,border:`1px solid ${C.aMid}`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Ic.Sparkles s={12}/></div>}
          <div style={{maxWidth:"78%",padding:"10px 13px",borderRadius:15,background:m.role==="user"?C.accent:C.surface,border:`1px solid ${m.role==="user"?"transparent":C.border}`,borderBottomLeftRadius:m.role==="ai"?4:15,borderBottomRightRadius:m.role==="user"?4:15}}>
            <p style={{fontSize:14,fontWeight:300,lineHeight:1.55,color:m.role==="user"?"#0A0A0F":C.text,whiteSpace:"pre-wrap"}}>{m.text}</p>
          </div>
        </div>
      ))}
      {loading&&<div style={{display:"flex",gap:8,alignItems:"flex-end"}}>
        <div style={{width:24,height:24,borderRadius:"50%",background:C.aDim,border:`1px solid ${C.aMid}`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Ic.Sparkles s={12}/></div>
        <div style={{padding:"10px 14px",background:C.surface,border:`1px solid ${C.border}`,borderRadius:"14px 14px 14px 4px"}}>
          <div style={{display:"flex",gap:4}}>{[0,1,2].map(i=><div key={i} style={{width:5,height:5,borderRadius:"50%",background:C.accent,animation:"pulse 1s ease infinite",animationDelay:`${i*.2}s`}}/>)}</div>
        </div>
      </div>}
    </div>
    <div style={{padding:"0 16px 8px",display:"flex",gap:6,flexWrap:"wrap",flexShrink:0}}>
      {CHIPS.map(c=><button key={c} onClick={()=>setInput(c)} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:14,padding:"5px 10px",fontSize:11,fontWeight:300,color:C.accent,flexShrink:0}}>{c}</button>)}
    </div>
    <div style={{padding:"8px 16px calc(env(safe-area-inset-bottom,16px) + 8px)",background:"rgba(10,10,15,0.9)",borderTop:`1px solid ${C.border}`,display:"flex",gap:8,alignItems:"flex-end",flexShrink:0}}>
      <div onClick={speech.listening?speech.stop:speech.start} style={{width:34,height:34,borderRadius:"50%",background:speech.listening?"rgba(255,68,68,0.15)":C.aDim,border:`1.5px solid ${speech.listening?C.red:C.aMid}`,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0}}>
        <div style={{color:speech.listening?C.red:C.accent}}>{speech.listening?<Ic.Stop s={11}/>:<Ic.Mic s={14}/>}</div>
      </div>
      <textarea style={{flex:1,background:C.surface,border:`1px solid ${input?C.aMid:C.border}`,borderRadius:14,color:C.text,fontSize:14,fontWeight:300,fontFamily:"'Inter',sans-serif",padding:"8px 12px",resize:"none",outline:"none",height:36,maxHeight:90,overflowY:"auto",lineHeight:1.4}}
        placeholder="Tell me what to change…" value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}}/>
      <button onClick={send} disabled={!input.trim()||loading} style={{width:34,height:34,borderRadius:"50%",background:input.trim()&&!loading?C.accent:"rgba(74,230,138,0.12)",border:"none",color:input.trim()&&!loading?"#0A0A0F":C.dim,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:16,fontWeight:500,transition:"all .15s"}}>↑</button>
    </div>
  </div>;
}

          <div key={idx} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"9px 14px",borderBottom:`1px solid ${C.border}`}}>
            <span style={{fontSize:13,fontWeight:300,color:C.text,flex:1}}>{ing.name}</span>
            {editIdx===idx?<input autoFocus type="number" inputMode="numeric" style={{width:66,background:"transparent",border:"none",borderBottom:`1.5px solid ${C.accent}`,color:C.accent,fontSize:13,fontWeight:400,textAlign:"right",outline:"none",fontFamily:"'Inter',sans-serif"}} value={ingVal} onChange={e=>setIngVal(e.target.value)} onBlur={()=>commitIng(idx)} onKeyDown={e=>e.key==="Enter"&&commitIng(idx)}/>
            :<div style={{display:"flex",alignItems:"center",gap:4,cursor:"pointer",color:C.sub}} onClick={()=>{setEditIdx(idx);setIngVal(String(ing.calories));}}><span style={{fontSize:11,fontWeight:300}}>{ing.calories} kcal</span><Ic.Edit/></div>}
          </div>
        ))}
        {addingVoice&&<div style={{padding:"10px 13px",borderTop:`1px solid ${C.border}`}}>
          <textarea style={{width:"100%",height:52,background:C.hover,border:`1px solid ${addTranscript?C.aMid:C.border}`,borderRadius:9,color:addTranscript?C.text:C.sub,fontSize:13,fontWeight:300,padding:"7px 11px",resize:"none",outline:"none",fontFamily:"'Inter',sans-serif",lineHeight:1.5,marginBottom:7}} placeholder="e.g. half tbsp butter…" value={addTranscript} onChange={e=>setAddTranscript(e.target.value)}/>
          {addError&&<p style={{color:C.red,fontSize:11,marginBottom:5}}>{addError}</p>}
          <div style={{display:"flex",gap:7}}>
            <button style={{flex:1,background:"transparent",border:`1px solid ${C.border}`,borderRadius:9,color:C.sub,fontSize:12,fontWeight:300,padding:"9px"}} onClick={()=>{speech.stop();setAddingVoice(false);setAddTranscript("");setAddError("");}}>Cancel</button>
            <button style={{flex:2,background:addLoading?"transparent":C.accent,border:addLoading?`1px solid ${C.aMid}`:"none",borderRadius:9,color:addLoading?C.accent:C.bg,fontSize:12,fontWeight:500,padding:"9px",opacity:addTranscript.trim()?1:0.35}} onClick={mergeItems} disabled={!addTranscript.trim()||addLoading}>{addLoading?"Calculating…":"Add →"}</button>
          </div>
        </div>}
      </Card>}
    </div>
  </div>;
}

function SettingsScreen({apiKey,onSave,onBack}) {
  const [val,setVal]=useState("");const [saved,setSaved]=useState(false);const [err,setErr]=useState("");
  const masked=apiKey?`${apiKey.slice(0,14)}…${apiKey.slice(-4)}`:null;
  const submit=()=>{const t=val.trim();if(!t){setErr("Please enter an API key");return;}onSave(t);setSaved(true);setVal("");setErr("");setTimeout(()=>setSaved(false),2500);};
  return <div style={{height:"100%",background:C.bg,overflowY:"auto",paddingBottom:48}}>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"calc(env(safe-area-inset-top,44px)+8px) 16px 16px"}}>
      <button style={{width:38,height:38,borderRadius:10,background:C.hover,border:`1px solid ${C.border}`,color:C.text,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={onBack}><Ic.Back/></button>
      <span style={{fontSize:15,fontWeight:400,color:C.text}}>Settings</span>
      <div style={{width:38}}/>
    </div>
    <div style={{padding:"0 16px",display:"flex",flexDirection:"column",gap:10}}>
      <Card style={{padding:"16px"}}>
        <p style={{fontSize:13,fontWeight:400,color:C.text,marginBottom:6}}>OpenAI API Key</p>
        {masked?<div style={{display:"flex",alignItems:"center",gap:5,marginBottom:9,padding:"7px 9px",background:C.aDim,borderRadius:7,border:`1px solid ${C.aMid}`}}><span style={{fontSize:10,color:C.accent}}>✓</span><span style={{fontSize:11,color:C.sub,fontFamily:"monospace"}}>{masked}</span></div>:<p style={{fontSize:11,color:C.red,marginBottom:9}}>⚠ No key — meals cannot be analyzed</p>}
        <p style={{fontSize:11,color:C.sub,lineHeight:1.6,marginBottom:9}}>Get yours at <span style={{color:C.accent}}>platform.openai.com/api-keys</span></p>
        <input type="password" placeholder={masked?"New key to replace…":"sk-..."} value={val} onChange={e=>{setVal(e.target.value);setErr("");setSaved(false);}} onKeyDown={e=>e.key==="Enter"&&submit()} style={{width:"100%",background:C.hover,border:`1px solid ${err?C.red:C.border}`,borderRadius:9,color:C.text,fontSize:14,fontWeight:300,padding:"10px 12px",outline:"none",fontFamily:"'Inter',sans-serif",marginBottom:7}}/>
        {err&&<p style={{color:C.red,fontSize:11,marginBottom:7}}>{err}</p>}
        <button style={{width:"100%",background:saved?C.aDim:C.accent,border:saved?`1px solid ${C.aMid}`:"none",borderRadius:9,color:saved?C.accent:C.bg,fontSize:13,fontWeight:500,padding:"11px"}} onClick={submit}>{saved?"✓ Saved!":"Save Key"}</button>
      </Card>
      <Card style={{padding:"16px"}}>
        <p style={{fontSize:13,fontWeight:400,color:C.text,marginBottom:6}}>About</p>
        <p style={{fontSize:11,color:C.sub,lineHeight:1.7,fontWeight:300}}>Food photos analyzed by GPT-4o. Voice logging uses browser speech recognition. Customize tab uses Claude AI. All data stored on-device only.</p>
      </Card>
    </div>
  </div>;
}

function ApiKeyScreen({onSave}) {
  const [val,setVal]=useState("");const [err,setErr]=useState("");
  const submit=()=>{if(!val.trim()){setErr("Please enter your API key");return;}onSave(val.trim());};
  return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100%",background:C.bg}}>
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"40px 26px",width:"100%",maxWidth:380}}>
      <div style={{fontSize:10,color:C.accent,fontWeight:300,letterSpacing:"2px",textTransform:"uppercase",marginBottom:16}}>Just Calories</div>
      <h1 style={{fontSize:26,fontWeight:200,color:C.text,textAlign:"center",lineHeight:1.2,letterSpacing:"-0.5px",marginBottom:6}}>Your app,<br/>your rules.</h1>
      <p style={{color:C.sub,fontSize:12,fontWeight:300,lineHeight:1.7,textAlign:"center",marginBottom:28}}>AI-powered food logging that adapts<br/>to exactly what you want to track.</p>
      <div style={{width:"100%",background:C.surface,borderRadius:16,padding:"20px 16px",border:`1px solid ${C.border}`}}>
        <p style={{color:C.sub,fontSize:12,fontWeight:300,lineHeight:1.7,textAlign:"center",marginBottom:12}}>Enter your OpenAI API key.<br/><span style={{color:C.accent}}>platform.openai.com/api-keys</span></p>
        <input style={{width:"100%",background:C.hover,border:`1px solid ${err?C.red:C.border}`,borderRadius:9,color:C.text,fontSize:15,fontWeight:300,padding:"11px 13px",outline:"none",fontFamily:"'Inter',sans-serif"}} type="password" placeholder="sk-..." value={val} onChange={e=>{setVal(e.target.value);setErr("");}} onKeyDown={e=>e.key==="Enter"&&submit()}/>
        {err&&<p style={{color:C.red,fontSize:11,marginTop:5}}>{err}</p>}
        <button style={{width:"100%",background:C.accent,border:"none",borderRadius:11,color:C.bg,fontSize:14,fontWeight:500,padding:"13px",marginTop:10}} onClick={submit}>Get Started →</button>
      </div>
      <p style={{color:C.dim,fontSize:10,fontWeight:300,marginTop:12,textAlign:"center",lineHeight:1.6}}>Stored only on this device.</p>
    </div>
  </div>;
}

// ─── ROOT ─────────────────────────────────────────────────────────────────────
function App() {
  const [apiKey,setApiKey]=useState(()=>loadKey());
  const [activeTab,setActiveTab]=useState("home");
  const [subScreen,setSubScreen]=useState(null); // "camera","voice","detail","settings"
  const [baseGoal,setBaseGoal]=useState(()=>loadBaseGoal());
  const [selected,setSelected]=useState(null);
  const [camImg,setCamImg]=useState({imageData:null,preview:null});
  const [widgetConfig,setWidgetConfig]=useState(()=>loadWidgetConfig());
  const dateKeyRef=useRef(fmtKey(new Date()));
  const [,bump]=useState(0);

  const handleConfigChange=useCallback(cfg=>{setWidgetConfig(cfg);saveWidgetConfig(cfg);},[]);
  const dateKey=dateKeyRef.current;
  const meals=loadMeals(dateKey);
  const burned=meals.filter(m=>m.type==="workout").reduce((s,m)=>s+m.totalCalories,0);
  const effectiveGoal=baseGoal+burned;
  const changeDate=d=>{const k=fmtKey(d);if(k===dateKeyRef.current)return;dateKeyRef.current=k;bump(n=>n+1);};
  const addMeal=async m=>{recordFoodItems(m.ingredients);const k=dateKeyRef.current;let s=m;if(m.imageBase64){const th=await makeThumbnail(m.imageBase64,m.imageMime||"image/jpeg",120,.7);s={...m,imageBase64:th||null};}saveMeals(k,[...loadMeals(k),s]);setSubScreen(null);bump(n=>n+1);};
  const addWorkout=w=>{const k=dateKeyRef.current;saveMeals(k,[...loadMeals(k),w]);bump(n=>n+1);};
  const updateMeal=m=>{recordFoodItems(m.ingredients);const k=dateKeyRef.current;saveMeals(k,loadMeals(k).map(x=>x.id===m.id?m:x));setSelected(m);bump(n=>n+1);};
  const deleteMeal=id=>{const k=dateKeyRef.current;saveMeals(k,loadMeals(k).filter(x=>x.id!==id));setSubScreen(null);bump(n=>n+1);};
  const saveApiKey=k=>{saveKey(k);setApiKey(k);};
  const selectMeal=m=>{
    if(m._quickEdit){const k=dateKeyRef.current;saveMeals(k,loadMeals(k).map(x=>x.id===m.id?{...x,totalCalories:m._newCal}:x));bump(n=>n+1);return;}
    if(m._delete){const k=dateKeyRef.current;saveMeals(k,loadMeals(k).filter(x=>x.id!==m.id));bump(n=>n+1);return;}
    setSelected(m);setSubScreen("detail");
  };

  if(!apiKey)return <ApiKeyScreen onSave={saveApiKey}/>;

  // Sub-screens float above tabs
  if(subScreen==="camera")return <PhotoScreen apiKey={apiKey} imageData={camImg.imageData} imagePreview={camImg.preview} onBack={()=>setSubScreen(null)} onAdd={addMeal}/>;
  if(subScreen==="voice")return <VoiceScreen apiKey={apiKey} onBack={()=>setSubScreen(null)} onAdd={addMeal}/>;
  if(subScreen==="detail"&&selected)return <DetailScreen meal={selected} onBack={()=>setSubScreen(null)} onUpdate={updateMeal} onDelete={deleteMeal} apiKey={apiKey}/>;
  if(subScreen==="settings")return <SettingsScreen apiKey={apiKey} onSave={saveApiKey} onBack={()=>setSubScreen(null)}/>;

  return <div style={{height:"100%",display:"flex",flexDirection:"column"}}>
    <div style={{flex:1,overflow:"hidden",position:"relative"}}>
      {activeTab==="home"&&<HomeScreen
        onOpenCamera={(imageData,preview)=>{setCamImg({imageData,preview});setSubScreen("camera");}}
        onOpenVoice={()=>setSubScreen("voice")}
        onAddWorkout={addWorkout} onSelectMeal={selectMeal}
        onOpenSettings={()=>setSubScreen("settings")}
        meals={meals} goal={effectiveGoal} baseGoal={baseGoal} setBaseGoal={n=>{setBaseGoal(n);saveBaseGoal(n);}}
        date={new Date(dateKey+"T12:00:00")} setDate={changeDate}
        widgetConfig={widgetConfig} onConfigChange={handleConfigChange}
      />}
      {activeTab==="customize"&&<CustomizeScreen widgetConfig={widgetConfig} onConfigChange={handleConfigChange}/>}
    </div>
    <TabBar activeTab={activeTab} onTab={setActiveTab}/>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
